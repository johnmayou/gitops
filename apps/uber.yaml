apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uber
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/johnmayou/uber
    targetRevision: main
    path: deploy/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: uber
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
