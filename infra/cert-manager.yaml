apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: john@johnmayou.com
    profile: tlsserver
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - dns01:
          cloudflare:
            email: john@johnmayou.com
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
